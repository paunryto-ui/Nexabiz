<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoVenture — Premium Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#D4AF37; --gold2:#FFD700;
  --dark:#0A0A0F; --dark2:#12121A; --dark3:#1A1A28;
  --accent:#00FFC2; --red:#FF3B5C; --text:#E8E8F0; --text2:#8888A8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;touch-action:manipulation;}

/* CANVAS BG */
#bgc{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .5s;}
.screen.active{opacity:1;pointer-events:all;}

/* LOADING */
#ls{flex-direction:column;gap:16px;background:var(--dark);z-index:900;}
.ld{width:52px;height:52px;border:3px solid rgba(212,175,55,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:6px;color:var(--text2);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* LOGIN */
#login-screen{background:radial-gradient(ellipse at 30% 50%,#1a1a3e 0%,var(--dark) 60%);padding:16px;}
.lc{
  background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid rgba(212,175,55,.3);border-radius:28px;
  padding:clamp(24px,6vw,52px) clamp(18px,5vw,44px);
  text-align:center;width:min(410px,100%);
  backdrop-filter:blur(20px);position:relative;overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,.6),0 0 60px rgba(212,175,55,.08);
}
.lc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:shim 3s infinite;}
@keyframes shim{0%,100%{opacity:.3}50%{opacity:1}}
.logo{font-family:'Bebas Neue',cursive;font-size:clamp(42px,10vw,58px);letter-spacing:6px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(212,175,55,.4));}
.tagline{color:var(--text2);font-size:12px;letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;font-weight:300;}
.globe{font-size:clamp(50px,14vw,70px);display:block;margin-bottom:10px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(0,255,194,.4));}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(212,175,55,.2),rgba(255,215,0,.1));border:1px solid rgba(212,175,55,.4);border-radius:20px;padding:5px 14px;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:22px;font-weight:600;}
.gbtn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#fff,#f0f0f0);color:#333;border:none;border-radius:14px;
  padding:clamp(13px,4vw,16px) 20px;font-size:clamp(14px,4vw,16px);font-weight:600;
  font-family:'Outfit',sans-serif;cursor:pointer;position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.3);-webkit-appearance:none;
}
.gbtn:active{transform:scale(.97);}
.gbtn svg{width:22px;height:22px;flex-shrink:0;}
.stats{display:flex;gap:10px;margin-top:24px;}
.si{flex:1;text-align:center;padding:12px 6px;background:rgba(255,255,255,.03);border-radius:12px;border:1px solid rgba(255,255,255,.06);}
.sn{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--gold);letter-spacing:2px;}
.sl{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}

/* ===== GAME ===== */
#gs{flex-direction:column;align-items:stretch;justify-content:flex-start;background:var(--dark2);}

/* HUD */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;flex-wrap:nowrap;
  padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top,0px));
  background:rgba(10,10,15,.93);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,175,55,.15);gap:7px;min-height:50px;
}
.hl{font-family:'Bebas Neue',cursive;font-size:clamp(17px,5vw,22px);letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.hsc,.htm{display:flex;align-items:center;gap:5px;border-radius:8px;padding:5px 9px;flex-shrink:0;}
.hsc{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.25);}
.htm{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.25);}
.sv{font-family:'Bebas Neue',cursive;font-size:clamp(17px,5vw,21px);color:var(--gold);letter-spacing:2px;min-width:36px;text-align:center;}
.tv{font-family:'Bebas Neue',cursive;font-size:clamp(17px,5vw,21px);color:var(--red);letter-spacing:2px;min-width:36px;text-align:center;}
.hr{font-size:11px;color:var(--text2);margin-left:auto;flex-shrink:0;white-space:nowrap;}
.hr span{color:var(--text);font-weight:600;}
.hu{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 8px;cursor:pointer;flex-shrink:0;}
.ha{width:24px;height:24px;border-radius:50%;}
.hn{font-size:12px;font-weight:500;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@media(max-width:400px){.hn{display:none;}}

/* CLUE AREA */
#clue{
  position:fixed;top:50px;left:0;right:0;bottom:0;
  z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;text-align:center;
  transition:background .5s;
}
.clue-emoji{font-size:clamp(60px,15vw,90px);animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(0,255,194,.4));margin-bottom:16px;}
.clue-q{font-family:'Bebas Neue',cursive;font-size:clamp(24px,7vw,42px);letter-spacing:4px;color:rgba(255,255,255,.2);margin-bottom:12px;}
.clue-txt{font-size:clamp(14px,4vw,18px);color:var(--text2);max-width:340px;line-height:1.6;font-weight:300;}
.clue-note{font-size:11px;color:rgba(255,255,255,.2);margin-top:16px;letter-spacing:2px;text-transform:uppercase;}

/* MAP PANEL */
#mp{
  position:fixed;z-index:200;
  bottom:0;left:0;right:0;
  padding:0 10px calc(8px + env(safe-area-inset-bottom,0px));
  background:linear-gradient(0deg,rgba(10,10,15,.97) 60%,transparent);
}
.mc{
  height:155px;border-radius:16px 16px 0 0;
  border:1.5px solid rgba(212,175,55,.35);overflow:hidden;
  position:relative;transition:height .3s;margin-bottom:6px;
}
.mc.exp{height:230px;}
#gmap{width:100%;height:100%;}
.mhl{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(212,175,55,.35);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gold);letter-spacing:1px;pointer-events:none;white-space:nowrap;z-index:10;}
.meb{position:absolute;top:7px;right:7px;z-index:10;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text);cursor:pointer;}
.gsbtn{
  display:block;width:100%;padding:clamp(13px,3.5vw,15px);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;
  font-size:clamp(13px,4vw,15px);font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 24px rgba(212,175,55,.3);-webkit-appearance:none;
}
.gsbtn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.5);}
.gsbtn:not(:disabled):active{transform:scale(.97);}

@media(orientation:landscape) and (max-height:500px){
  #mp{bottom:8px;right:10px;left:auto;width:min(260px,37vw);padding:0;background:none;}
  .mc{height:170px;border-radius:14px;}
  .gsbtn{border-radius:10px;}
}
@media(min-width:768px) and (min-height:500px){
  #mp{bottom:18px;right:18px;left:auto;width:290px;padding:0;background:none;}
  .mc{height:195px;border-radius:16px;margin-bottom:7px;}
  .mc.exp{height:255px;}
  .gsbtn{width:100%;}
}
#clue{padding-bottom:240px;}
@media(orientation:landscape) and (max-height:500px){#clue{padding-bottom:20px;padding-right:300px;}}
@media(min-width:768px){#clue{padding-bottom:20px;padding-right:320px;}}

/* RESULT */
#ro{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;padding:12px;backdrop-filter:blur(8px);overflow-y:auto;}
#ro.active{opacity:1;pointer-events:all;}
.rcard{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid rgba(212,175,55,.3);border-radius:22px;padding:clamp(18px,5vw,34px);width:min(540px,100%);position:relative;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.8);}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--accent),var(--gold));animation:shim 2s infinite;}
.rtit{font-family:'Bebas Neue',cursive;font-size:clamp(26px,8vw,40px);letter-spacing:3px;text-align:center;margin-bottom:4px;}
.rloc{text-align:center;color:var(--text2);font-size:12px;margin-bottom:14px;}
#rmw{width:100%;height:clamp(150px,34vw,210px);border-radius:13px;overflow:hidden;margin-bottom:16px;}
#rmap{width:100%;height:100%;}
.sdsp{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.scircle{width:clamp(84px,22vw,106px);height:clamp(84px,22vw,106px);flex-shrink:0;border-radius:50%;background:conic-gradient(var(--gold) 0deg,rgba(255,255,255,.05) 0deg);display:flex;align-items:center;justify-content:center;}
.sci{width:74%;height:74%;background:var(--dark2);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sp{font-family:'Bebas Neue',cursive;font-size:clamp(20px,6vw,28px);color:var(--gold);letter-spacing:2px;line-height:1;}
.spl{font-size:9px;color:var(--text2);letter-spacing:2px;}
.di{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:14px;}
.dn{font-family:'Bebas Neue',cursive;font-size:clamp(26px,7vw,34px);color:var(--accent);letter-spacing:2px;line-height:1;}
.dl{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.dc{font-size:12px;color:var(--text2);}
.bnxt{width:100%;padding:clamp(12px,3.5vw,15px);background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;font-size:clamp(13px,4vw,15px);font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(212,175,55,.3);-webkit-appearance:none;}
.bnxt:active{transform:scale(.97);}

/* FINAL */
#fs{background:radial-gradient(ellipse at center,#1a1a3e 0%,var(--dark) 70%);z-index:600;padding:16px;}
.fc{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid rgba(212,175,55,.4);border-radius:26px;padding:clamp(28px,7vw,48px);width:min(460px,100%);text-align:center;position:relative;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.7);}
.trp{font-size:clamp(54px,14vw,78px);display:block;margin-bottom:10px;animation:tb .8s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes tb{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1);opacity:1}}
.ftit{font-family:'Bebas Neue',cursive;font-size:clamp(34px,10vw,50px);letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.ftot{font-family:'Bebas Neue',cursive;font-size:clamp(58px,16vw,80px);color:var(--gold);letter-spacing:4px;line-height:1;text-shadow:0 0 40px rgba(212,175,55,.5);margin:14px 0;}
.frank{display:inline-block;padding:7px 18px;border-radius:20px;font-size:clamp(11px,3.5vw,14px);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;border:1px solid rgba(255,255,255,.15);}
.bpa{width:100%;padding:clamp(13px,4vw,17px);background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:13px;color:#000;font-family:'Outfit',sans-serif;font-size:clamp(14px,4.5vw,17px);font-weight:700;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 12px 40px rgba(212,175,55,.4);-webkit-appearance:none;}
.bpa:active{transform:scale(.97);}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;backdrop-filter:blur(10px);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* CONFETTI */
.cp{position:fixed;border-radius:2px;animation:cf linear forwards;z-index:9999;pointer-events:none;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Leaflet overrides */
.leaflet-container{background:#0d1b2a!important;}
</style>
</head>
<body>

<canvas id="bgc"></canvas>

<!-- LOADING -->
<div id="ls" class="screen active">
  <div class="ld"></div>
  <div class="lt">Memuat...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="lc">
    <span class="globe">🌍</span>
    <div class="logo">GeoVenture</div>
    <div class="tagline">Explore The World</div>
    <div class="badge">⭐ Premium Edition</div>
    <button class="gbtn" id="glogin">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Masuk dengan Google
    </button>
    <div class="stats">
      <div class="si"><div class="sn">55M+</div><div class="sl">Pemain</div></div>
      <div class="si"><div class="sn">200+</div><div class="sl">Negara</div></div>
      <div class="si"><div class="sn">∞</div><div class="sl">Lokasi</div></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gs" class="screen">
  <!-- HUD -->
  <div class="hud">
    <div class="hl">GeoVenture</div>
    <div class="hsc"><span style="font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;display:none" id="sc-lbl">SKOR</span><span class="sv" id="hscore">0</span></div>
    <div class="htm"><span style="font-size:13px">⏱</span><span class="tv" id="tval">90</span></div>
    <div class="hr">R<span id="rnum">1</span>/5</div>
    <div class="hu" id="huu">
      <img class="ha" id="hav" src="" alt="">
      <span class="hn" id="hnam"></span>
    </div>
  </div>

  <!-- Clue display -->
  <div id="clue">
    <div class="clue-emoji" id="cemoji">🌍</div>
    <div class="clue-q">DI MANA INI?</div>
    <div class="clue-txt" id="ctxt">Memuat petunjuk...</div>
    <div class="clue-note">Tebak lokasi di peta di bawah</div>
  </div>

  <!-- Map panel -->
  <div id="mp">
    <div class="mc" id="mc">
      <div id="gmap"></div>
      <div class="mhl">📍 Klik/tap untuk tebak</div>
      <button class="meb" id="mexp">⬆</button>
    </div>
    <button class="gsbtn" id="gbtn" disabled>TEBAK LOKASI!</button>
  </div>
</div>

<!-- RESULT -->
<div id="ro">
  <div class="rcard">
    <div class="rtit" id="rtit">🎯 Tepat!</div>
    <div class="rloc" id="rloc"></div>
    <div id="rmw"><div id="rmap"></div></div>
    <div class="sdsp">
      <div class="scircle" id="sci">
        <div class="sci"><div class="sp" id="rpts">0</div><div class="spl">POIN</div></div>
      </div>
      <div class="di">
        <div class="dn" id="rdist">—</div>
        <div class="dl">Jarak dari lokasi</div>
        <div class="dc" id="rcmt"></div>
      </div>
    </div>
    <button class="bnxt" id="bnxt">Ronde Berikutnya →</button>
  </div>
</div>

<!-- FINAL -->
<div id="fs" class="screen">
  <div class="fc">
    <span class="trp" id="trp">🏆</span>
    <div class="ftit">Game Selesai!</div>
    <div style="color:var(--text2);font-size:12px;letter-spacing:2px">TOTAL SKOR</div>
    <div class="ftot" id="ftot">0</div>
    <div class="frank" id="frank"></div>
    <button class="bpa" id="bpa">🌍 Main Lagi</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== AUDIO =====
let AC;
function ac(){return AC||(AC=new(window.AudioContext||window.webkitAudioContext)());}
const SFX={
  click(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(350,c.currentTime+.1);g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);o.start();o.stop(c.currentTime+.1);}catch(e){}},
  pin(){try{const c=ac();[0,.05,.1].forEach((d,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=500+i*200;g.gain.setValueAtTime(.15,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.15);o.start(c.currentTime+d);o.stop(c.currentTime+d+.15);});}catch(e){}},
  ok(){try{const c=ac();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;const t=c.currentTime+i*.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.05);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}catch(e){}},
  bad(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,c.currentTime);o.frequency.exponentialRampToValueAtTime(70,c.currentTime+.4);g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.start();o.stop(c.currentTime+.4);}catch(e){}},
  beep(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.07);o.start();o.stop(c.currentTime+.07);}catch(e){}},
  win(){try{const c=ac();[261,329,392,523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;const t=c.currentTime+i*.08;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}catch(e){}}
};

// ===== PARTICLES =====
(()=>{
  const cv=document.getElementById('bgc'),ctx=cv.getContext('2d');
  let pts=[];
  const rz=()=>{cv.width=innerWidth;cv.height=innerHeight;};
  const mk=()=>{pts=[];for(let i=0;i<55;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.5+.4,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,a:Math.random()*.4+.08,c:Math.random()>.7?'#D4AF37':'#4A90FF'});};
  const dr=()=>{
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(dr);
  };
  rz();mk();dr();window.addEventListener('resize',()=>{rz();mk();});
})();

// ===== STATE =====
const G={
  round:0,total:5,score:0,
  locs:[],guess:null,
  timerInt:null,time:90,
  gmap:null,gmarker:null,
  expanded:false,
};

// ===== HELPERS =====
function SS(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(m,ms=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function hav(a,b,c,d){const R=6371,dl=(c-a)*Math.PI/180,do2=(d-b)*Math.PI/180,e=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(do2/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));}
function pts(d){if(d<1)return 5000;if(d>10000)return 0;return Math.round(5000*Math.exp(-d/1500));}
function confetti(n=80){
  const cols=['#D4AF37','#FFD700','#00FFC2','#FF3B5C','#4A90FF','#fff'];
  for(let i=0;i<n;i++){const e=document.createElement('div');e.className='cp';e.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};`;document.body.appendChild(e);setTimeout(()=>e.remove(),4000);}
}

// ===== GUESS MAP =====
function initMap(){
  if(G.gmap)return;
  G.gmap=L.map('gmap',{zoomControl:true,attributionControl:false,center:[20,0],zoom:2,minZoom:1,tap:true,tapTolerance:15});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(G.gmap);
  G.gmap.on('click',e=>{
    ac();SFX.pin();
    G.guess=e.latlng;
    if(G.gmarker)G.gmarker.remove();
    G.gmarker=L.circleMarker(e.latlng,{radius:10,fillColor:'#D4AF37',color:'#000',weight:2,fillOpacity:1}).addTo(G.gmap);
    document.getElementById('gbtn').disabled=false;
  });
  setTimeout(()=>G.gmap.invalidateSize(),300);
}

document.getElementById('mexp').addEventListener('click',e=>{
  e.stopPropagation();SFX.click();
  G.expanded=!G.expanded;
  document.getElementById('mc').classList.toggle('exp',G.expanded);
  document.getElementById('mexp').textContent=G.expanded?'⬇':'⬆';
  setTimeout(()=>{if(G.gmap)G.gmap.invalidateSize();},350);
});

// ===== LOGIN =====
document.getElementById('glogin').addEventListener('click',async()=>{
  SFX.click();ac();
  try{await window.firebaseSignIn();}
  catch(e){toast('❌ Login gagal. Pastikan pop-up tidak diblokir.');}
});
document.getElementById('huu').addEventListener('click',async()=>{
  SFX.click();
  if(confirm('Keluar dari game?')){clearInterval(G.timerInt);await window.firebaseSignOut();SS('login-screen');}
});

// ===== GAME =====
function startGame(){
  SS('ls');
  G.locs=[...LOCS].sort(()=>Math.random()-.5).slice(0,G.total);
  G.round=0;G.score=0;
  document.getElementById('hscore').textContent='0';
  initMap();
  setTimeout(()=>{SS('gs');loadRound();},800);
}

function loadRound(){
  const l=G.locs[G.round];
  G.guess=null;
  document.getElementById('rnum').textContent=G.round+1;
  document.getElementById('gbtn').disabled=true;
  // Update clue
  document.getElementById('cemoji').textContent=l.emoji;
  document.getElementById('ctxt').textContent=l.clue;
  document.getElementById('clue').style.background=`radial-gradient(ellipse at center,${l.bg} 0%,transparent 70%)`;
  // Reset map
  if(G.gmap){
    G.gmap.setView([20,0],2);
    if(G.gmarker){G.gmarker.remove();G.gmarker=null;}
    setTimeout(()=>G.gmap.invalidateSize(),200);
  }
  // Timer
  clearInterval(G.timerInt);
  G.time=90;
  document.getElementById('tval').textContent='90';
  document.getElementById('tval').style.color='var(--red)';
  G.timerInt=setInterval(()=>{
    G.time--;
    document.getElementById('tval').textContent=G.time;
    if(G.time<=10){document.getElementById('tval').style.color='#ff0000';SFX.beep();}
    if(G.time<=0){clearInterval(G.timerInt);if(!G.guess)G.guess=L.latLng(0,0);SFX.bad();showResult();}
  },1000);
}

document.getElementById('gbtn').addEventListener('click',()=>{
  if(!G.guess)return;
  SFX.click();clearInterval(G.timerInt);showResult();
});

// ===== RESULT =====
let resMap=null;
function showResult(){
  const l=G.locs[G.round];
  const gla=G.guess.lat,gln=G.guess.lng;
  const d=hav(gla,gln,l.lat,l.lng);
  const p=pts(d);
  G.score+=p;

  const deg=(p/5000)*360;
  document.getElementById('sci').style.background=`conic-gradient(var(--gold) ${deg}deg,rgba(255,255,255,.05) ${deg}deg)`;
  document.getElementById('rpts').textContent=p.toLocaleString();
  document.getElementById('rdist').textContent=d<1?`${Math.round(d*1000)} m`:`${Math.round(d).toLocaleString()} km`;
  document.getElementById('rloc').textContent='📍 '+l.name;
  document.getElementById('hscore').textContent=G.score.toLocaleString();

  let tit,cmt;
  if(d<1){tit='🎯 SEMPURNA!';cmt='Luar biasa! Tepat sekali!';SFX.ok();confetti(120);}
  else if(d<50){tit='🔥 Sangat Dekat!';cmt='Hampir sempurna!';SFX.ok();confetti(80);}
  else if(d<500){tit='✅ Bagus!';cmt='Cukup dekat!';SFX.ok();confetti(40);}
  else if(d<2000){tit='👍 Lumayan';cmt='Bisa lebih baik!';SFX.click();}
  else{tit='😅 Jauh Banget!';cmt='Terus berlatih!';SFX.bad();}
  document.getElementById('rtit').textContent=tit;
  document.getElementById('rcmt').textContent=cmt;
  document.getElementById('ro').classList.add('active');

  // Result map
  setTimeout(()=>{
    document.getElementById('rmap').innerHTML='';
    if(resMap){try{resMap.remove();}catch(e){}resMap=null;}
    resMap=L.map('rmap',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(resMap);

    const ai=L.divIcon({html:`<div style="width:20px;height:20px;background:#FF3B5C;border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(255,59,92,.7)"></div>`,iconAnchor:[10,10],className:''});
    L.marker([l.lat,l.lng],{icon:ai}).addTo(resMap).bindPopup(`<b>📍 ${l.name}</b>`).openPopup();

    if(gla!==0||gln!==0){
      const gi=L.divIcon({html:`<div style="width:18px;height:18px;background:#D4AF37;border:2px solid #000;border-radius:50%;box-shadow:0 0 12px rgba(212,175,55,.7)"></div>`,iconAnchor:[9,9],className:''});
      L.marker([gla,gln],{icon:gi}).addTo(resMap).bindPopup('<b>🎯 Tebakan Kamu</b>');
      L.polyline([[gla,gln],[l.lat,l.lng]],{color:'#00FFC2',weight:2.5,dashArray:'6,8',opacity:.85}).addTo(resMap);
      resMap.fitBounds(L.latLngBounds([[l.lat,l.lng],[gla,gln]]),{padding:[30,30]});
    } else {
      resMap.setView([l.lat,l.lng],5);
    }
  },100);
}

document.getElementById('bnxt').addEventListener('click',()=>{
  SFX.click();
  document.getElementById('ro').classList.remove('active');
  G.round++;
  if(G.round>=G.total)showFinal();
  else loadRound();
});

// ===== FINAL =====
function showFinal(){
  const t=G.score;
  document.getElementById('ftot').textContent=t.toLocaleString();
  let rank,col,trp;
  if(t>=22500){rank='🌍 World Explorer';col='linear-gradient(135deg,#D4AF37,#FFD700)';trp='🏆';}
  else if(t>=17500){rank='✈️ Globetrotter';col='linear-gradient(135deg,#C0C0C0,#E8E8E8)';trp='🥈';}
  else if(t>=12500){rank='🗺️ Navigator';col='linear-gradient(135deg,#CD7F32,#E8A87C)';trp='🥉';}
  else if(t>=7500){rank='🧭 Explorer';col='linear-gradient(135deg,#4A90FF,#6AAFFF)';trp='🎖️';}
  else{rank='🌱 Beginner';col='linear-gradient(135deg,#00FFC2,#00E5AC)';trp='🌍';}
  document.getElementById('trp').textContent=trp;
  const re=document.getElementById('frank');
  re.textContent=rank;re.style.background=col;re.style.webkitBackgroundClip='text';re.style.webkitTextFillColor='transparent';re.style.backgroundClip='text';
  setTimeout(()=>{SFX.win();confetti(150);},300);
  SS('fs');
}
document.getElementById('bpa').addEventListener('click',()=>{SFX.click();startGame();});

// ===== AUTH =====
function onUser(u){
  if(u){
    document.getElementById('hav').src=u.photoURL||'';
    document.getElementById('hnam').textContent=u.displayName||'Player';
    startGame();
  } else {
    SS('login-screen');
  }
}
window._onAuth=onUser;
const ci=setInterval(()=>{if(window._fbReady){clearInterval(ci);if(window._currentUser!==undefined)onUser(window._currentUser);}},80);
setTimeout(()=>{clearInterval(ci);if(!document.querySelector('.screen.active')||document.getElementById('ls').classList.contains('active'))SS('login-screen');},5000);
</script>
